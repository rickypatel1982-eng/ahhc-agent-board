// ── CALL CLAUDE API ───────────────────────────────────────────────────────────
async function callClaude(systemPrompt, messages, apiKey) {
  if (!apiKey || !apiKey.trim().startsWith("sk-")) {
    throw new Error("NO_KEY");
  }
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey.trim(),
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: systemPrompt,
      messages: messages.map(m => ({ role: m.role, content: m.content })),
    }),
  });
  let data;
  try { data = await res.json(); } catch {
    throw new Error("Could not parse API response (HTTP " + res.status + ")");
  }
  if (!res.ok) throw new Error(data?.error?.message || "API error " + res.status);
  return data.content?.[0]?.text || "No response received.";
}

// ── AGENT CHAT ────────────────────────────────────────────────────────────────
function AgentChat({ agent, onBack, thread, setThread, apiKey }) {
  const [msgs, setMsgs] = useState(() => {
    try { return JSON.parse(localStorage.getItem(`sg_msgs_${agent.id}`) || "[]"); } catch { return []; }
  });
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);
  const taRef  = useRef(null);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior:"smooth" }); }, [msgs, loading]);
  useEffect(() => { try { localStorage.setItem(`sg_msgs_${agent.id}`, JSON.stringify(msgs)); } catch {} }, [msgs, agent.id]);

  const send = useCallback(async () => {
    if (!input.trim() || loading) return;
    const userMsg = { role:"user", content:input.trim() };
    const newMsgs = [...msgs, userMsg];
    setMsgs(newMsgs); setInput(""); setLoading(true);
    if (taRef.current) taRef.current.style.height = "42px";
    try {
      if (!apiKey) throw new Error("No API key set. Go to Profile → Reset API Key to add one.");
      const reply = await callClaude(agent.system, newMsgs, apiKey);
      setMsgs(m => [...m, { role:"assistant", content:reply }]);
    } catch(e) {
      setMsgs(m => [...m, { role:"assistant", content:"Error: " + (e.message || String(e)) }]);
    }
    setLoading(false);
  }, [input, loading, msgs, agent, apiKey]);

  const handleKey = (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } };

function Pipeline() {
  const [bids, setBids] = useState(() => { try { return JSON.parse(localStorage.getItem("sg_pipe") || "[]"); } catch { return []; } });
  const [adding, setAdding] = useState(false);
  const [form, setForm] = useState({ name:"", agency:"", value:"", due:"", type:"", notes:"" });

  const save = (b) => { setBids(b); try { localStorage.setItem("sg_pipe", JSON.stringify(b)); } catch {} };
  const addBid = () => {
    if (!form.name.trim()) return;
    save([...bids, { id:Date.now()+"", stage:"Identified", ...form }]);
    setForm({ name:"", agency:"", value:"", due:"", type:"", notes:"" }); setAdding(false);
  };
  const moveBid = (id, stage) => save(bids.map(b => b.id===id ? {...b,stage} : b));
  const delBid  = (id) => { if(confirm("Remove this bid?")) save(bids.filter(b => b.id!==id)); };

  return (
    <div className="fade-up" style={g({ padding:"20px 20px 80px" })}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:20, flexWrap:"wrap", gap:10 }}>

          <div style={g({ fontSize:15, fontWeight:600, marginBottom:14, letterSpacing:"-0.02em" })}>New Opportunity</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 }}>
            {[["name","Name *"],["agency","Agency"],["value","Est. Value"],["due","Due Date"],["type","Type"],["notes","Notes"]].map(([k,l]) => (

function Audit() {
  const passed = AUDIT_CHECKS.filter(c => c.st==="pass").length;

  const cats = [...new Set(AUDIT_CHECKS.map(c => c.cat))];

  return (
    <div className="fade-up" style={g({ padding:"20px 20px 80px" })}>

        <div>
          <div style={g({ fontSize:16, fontWeight:600, letterSpacing:"-0.02em", marginBottom:3 })}>Bid Readiness Score</div>
          <div style={g({ fontSize:13, color:C.text2, marginBottom:10 })}>{passed} passed · {warned} warnings</div>
          <div style={{ height:5, background:C.bg, borderRadius:3, width:200, overflow:"hidden" }}>
            <div style={{ height:"100%", borderRadius:3, background:scoreColor, width:`${score}%`, transition:"width 0.7s cubic-bezier(0.34,1.56,0.64,1)" }}/>
          </div>
        </div>
      </div>

      {cats.map(cat => (
        <div key={cat} style={{ marginBottom:6 }}>
          <div style={g({ fontSize:11, fontWeight:600, color:C.text3, textTransform:"uppercase", letterSpacing:"0.06em", padding:"14px 0 8px", borderBottom:`1px solid ${C.line}` })}>{cat}</div>

              <div>
                <div style={g({ fontSize:13.5, fontWeight:500, letterSpacing:"-0.01em" })}>{c.item}</div>
                <div style={g({ fontSize:12.5, color:C.text2, marginTop:1 })}>{c.note}</div>

          <div style={g({ fontSize:10.5, fontWeight:600, color:C.text3, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:4 })}>{l}</div>
          <textarea defaultValue={v} rows={3} style={g({ width:"100%", background:C.bg, border:`1px solid ${C.line}`, borderRadius:8, padding:"10px 12px", fontSize:13.5, color:C.text, resize:"vertical", outline:"none", minHeight:72, lineHeight:1.5 })}/>
        </div>
      ))}

      {onResetKey && (
        <div style={g({ marginTop:8, paddingTop:20, borderTop:`1px solid ${C.line}`, marginBottom:40 })}>
          <div style={g({ fontSize:13, fontWeight:600, color:C.text, marginBottom:4 })}>API Key</div>
          <div style={g({ fontSize:12.5, color:C.text2, marginBottom:12 })}>Your Anthropic API key is saved on this device. Reset to enter a new key.</div>
          <button onClick={onResetKey} style={g({ background:C.redBg, border:`1px solid rgba(255,59,48,0.2)`, borderRadius:8, padding:"8px 16px", fontSize:13, fontWeight:500, color:C.red })}>
            Reset API Key
          </button>
        </div>
      )}
    </div>
  );
}

// ── BOTTOM NAV ────────────────────────────────────────────────────────────────
const BOTTOM_TABS = [
  { id:"dashboard", label:"Board",    icon:"⌂" },
  { id:"pipeline",  label:"Pipeline", icon:"▦" },
  { id:"sources",   label:"Sources",  icon:"✦" },
  { id:"thread",    label:"Thread",   icon:"≡" },
  { id:"audit",     label:"Audit",    icon:"◎" },
];

function BottomNav({ view, onNav }) {
  return (
    <div style={g({ position:"fixed", bottom:0, left:0, right:0, height:68, background:"rgba(255,255,255,0.94)", backdropFilter:"blur(20px)", WebkitBackdropFilter:"blur(20px)", borderTop:`1px solid ${C.line}`, display:"flex", justifyContent:"space-around", alignItems:"flex-start", paddingTop:8, zIndex:200 })}>
      {BOTTOM_TABS.map(t => (
        <button key={t.id} onClick={() => onNav(t.id)} style={g({ background:"none", border:"none", display:"flex", flexDirection:"column", alignItems:"center", gap:2, padding:"0 8px", minWidth:52 })}>
          <div style={{ width:30, height:30, borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, background:view===t.id?C.blueBg:"transparent", transition:"all 0.15s" }}>
            {t.icon}
          </div>
          <span style={g({ fontSize:10, fontWeight:view===t.id?600:500, color:view===t.id?C.blue:C.text3, letterSpacing:"0.01em", transition:"color 0.15s" })}>{t.label}</span>
        </button>
      ))}
    </div>
  );
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
function Sidebar({ view, activeAgent, onNav, onOpenAgent }) {
  const [hovered, setHovered] = useState(false);
  const w = hovered ? 220 : 62;

  return (
    <div
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={g({ width:w, flexShrink:0, background:"rgba(29,29,31,0.97)", backdropFilter:"blur(20px)", display:"flex", flexDirection:"column", padding:"16px 0 20px", overflow:"hidden", transition:"width 0.28s cubic-bezier(0.25,0.46,0.45,0.94)", zIndex:100, position:"relative" })}
    >
      {/* Logo */}
      <div style={{ padding:"0 13px 16px", borderBottom:"1px solid rgba(255,255,255,0.06)", flexShrink:0, marginBottom:8 }}>
        <div style={g({ width:34, height:34, background:C.blue, borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, fontWeight:700, color:"#fff" })}>S</div>
      </div>

      <div style={{ flex:1, overflowY:"auto", padding:"0 10px" }}>
        {/* Nav */}
        <div style={g({ fontSize:9, fontWeight:600, letterSpacing:"0.12em", textTransform:"uppercase", color:"rgba(255,255,255,0.22)", padding:"10px 10px 4px", opacity:hovered?1:0, transition:"opacity 0.2s" })}>Menu</div>
        {[{id:"dashboard",icon:"⌂",label:"Dashboard"},{id:"pipeline",icon:"▦",label:"Bid Pipeline"},{id:"sources",icon:"✦",label:"Sources Sought"},{id:"thread",icon:"≡",label:"Mission Thread"},{id:"audit",icon:"◎",label:"Readiness Audit"},{id:"profile",icon:"⊙",label:"Profile"}].map(t => (
          <button key={t.id} onClick={() => onNav(t.id)} style={g({ width:"100%", background:view===t.id&&!activeAgent?"rgba(0,113,227,0.2)":"none", border:"none", display:"flex", alignItems:"center", gap:11, padding:"8px 10px", borderRadius:8, color:view===t.id&&!activeAgent?"#fff":"rgba(255,255,255,0.5)", fontSize:13, fontWeight:view===t.id&&!activeAgent?500:400, cursor:"pointer", marginBottom:1, textAlign:"left", whiteSpace:"nowrap", overflow:"hidden", transition:"all 0.14s" })}>
            <span style={{ fontSize:15, width:22, textAlign:"center", flexShrink:0, opacity:0.8 }}>{t.icon}</span>
            <span style={{ opacity:hovered?1:0, transform:hovered?"translateX(0)":"translateX(-6px)", transition:"all 0.2s" }}>{t.label}</span>
          </button>
        ))}

        <div style={{ height:1, background:"rgba(255,255,255,0.06)", margin:"8px 0" }}/>

        {/* Agents */}
        <div style={g({ fontSize:9, fontWeight:600, letterSpacing:"0.12em", textTransform:"uppercase", color:"rgba(255,255,255,0.22)", padding:"10px 10px 4px", opacity:hovered?1:0, transition:"opacity 0.2s" })}>Agents</div>
        {AGENTS.map(a => (
          <button key={a.id} onClick={() => onOpenAgent(a)} style={g({ width:"100%", background:activeAgent?.id===a.id?"rgba(0,113,227,0.18)":"none", border:"none", display:"flex", alignItems:"center", gap:10, padding:"7px 10px", borderRadius:8, color:activeAgent?.id===a.id?"#fff":"rgba(255,255,255,0.45)", fontSize:12, cursor:"pointer", marginBottom:1, textAlign:"left", whiteSpace:"nowrap", overflow:"hidden", transition:"all 0.14s" })}>
            <span style={{ fontSize:14, width:22, textAlign:"center", flexShrink:0 }}>{a.icon}</span>
            <span style={{ opacity:hovered?1:0, transform:hovered?"translateX(0)":"translateX(-6px)", transition:"all 0.2s" }}>{a.name}</span>
          </button>
        ))}
      </div>

      {/* Footer */}
      <div style={{ padding:"10px 14px 0", borderTop:"1px solid rgba(255,255,255,0.06)", marginTop:8 }}>
        <div style={{ display:"flex", alignItems:"center", gap:7 }}>
          <div style={{ width:6, height:6, borderRadius:"50%", background:C.green, flexShrink:0, animation:"pulse 2.5s ease-in-out infinite" }}/>
          <span style={g({ fontSize:9, fontFamily:"'SF Mono',monospace", color:"rgba(255,255,255,0.18)", opacity:hovered?1:0, transition:"opacity 0.2s", whiteSpace:"nowrap" })}>UEI KFF4PM5PM468 · CAGE 8WJN9</span>
        </div>
      </div>
    </div>
  );
}


// ── API KEY SETUP SCREEN ──────────────────────────────────────────────────────
function ApiKeySetup({ onSave }) {
  const [key, setKey] = useState("");
  const [error, setError] = useState("");
  const handleSave = () => {
    const k = key.trim();
    if (!k.startsWith("sk-")) {
      setError("API key must start with sk- — check and try again.");
      return;
    }
    try { localStorage.setItem("sg_apikey", k); } catch {}
    onSave(k);
  };

  return (
    <div style={g({ height:"100vh", background:C.bg, display:"flex", alignItems:"center", justifyContent:"center", padding:24 })}>
      <div style={g({ background:C.surface, border:`1px solid ${C.line}`, borderRadius:20, padding:"32px 28px", maxWidth:420, width:"100%", boxShadow:"0 8px 40px rgba(0,0,0,0.1)" })}>

        {/* Logo */}
        <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:28 }}>
          <div style={g({ width:42, height:42, background:C.blue, borderRadius:10, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, fontWeight:700, color:"#fff" })}>S</div>
          <div>
            <div style={g({ fontSize:14, fontWeight:600, color:C.text, letterSpacing:"-0.01em" })}>Shan Group, LLC</div>
            <div style={g({ fontSize:12, color:C.text2 })}>AI Agent Command Board</div>
          </div>
        </div>

        <div style={g({ fontSize:22, fontWeight:700, letterSpacing:"-0.03em", marginBottom:6 })}>Connect Your Agents</div>
        <div style={g({ fontSize:14, color:C.text2, lineHeight:1.55, marginBottom:24 })}>
          Enter your Anthropic API key to activate all 10 agents. Your key is saved only on this device.
        </div>

        {/* How to get key */}
        <div style={g({ background:C.blueBg, borderRadius:10, padding:"12px 14px", marginBottom:20 })}>
          <div style={g({ fontSize:12, fontWeight:600, color:C.blue, marginBottom:5 })}>How to get your API key</div>
          <div style={g({ fontSize:12, color:"#005abf", lineHeight:1.6 })}>
            1. Go to <strong>console.anthropic.com</strong><br/>
            2. Sign in or create an account<br/>
            3. Click <strong>API Keys</strong> → <strong>Create Key</strong><br/>
            4. Copy and paste it below
          </div>
        </div>

        <div style={g({ fontSize:11, fontWeight:600, color:C.text3, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:5 })}>API Key</div>
        <input
          type="password"
          value={key}
          onChange={e => { setKey(e.target.value); setError(""); }}
          onKeyDown={e => e.key === "Enter" && handleSave()}
          placeholder="sk-ant-..."
          style={g({ width:"100%", background:C.bg, border:`1px solid ${error ? C.red : C.line}`, borderRadius:10, padding:"11px 14px", fontSize:14, color:C.text, outline:"none", marginBottom:6, letterSpacing:"0.02em" })}
        />
        {error && <div style={g({ fontSize:12, color:C.red, marginBottom:10 })}>{error}</div>}

        <button
          onClick={handleSave}
          disabled={!key.trim()}
          style={g({ width:"100%", background: !key.trim() ? C.text3 : C.blue, color:"#fff", border:"none", borderRadius:10, padding:"13px", fontSize:15, fontWeight:600, marginTop:8, transition:"all 0.15s", letterSpacing:"-0.015em" })}
        >
          "Activate Agents →"
        </button>

        <div style={g({ fontSize:11.5, color:C.text3, textAlign:"center", marginTop:14, lineHeight:1.5 })}>
          Your key never leaves your device. Typical usage costs a few cents per conversation.
        </div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [apiKey,      setApiKey]      = useState(() => { try { return localStorage.getItem("sg_apikey") || ""; } catch { return ""; } });
  const [view,        setView]        = useState("dashboard");
  const [activeAgent, setActiveAgent] = useState(null);
  const [thread,      setThread]      = useState(() => { try { return JSON.parse(localStorage.getItem("sg_thread") || "[]"); } catch { return []; } });
  const isMobile = typeof window !== "undefined" && window.innerWidth <= 640;

  useEffect(() => { try { localStorage.setItem("sg_thread", JSON.stringify(thread)); } catch {} }, [thread]);

  // No API key — show setup screen
  if (!apiKey || !apiKey.startsWith("sk-")) {
    return (
      <>
        <GlobalStyle/>
        <ApiKeySetup onSave={k => setApiKey(k)}/>
      </>
    );
  }

  const openAgent = (agent) => { setActiveAgent(agent); };
  const closeAgent = () => { setActiveAgent(null); };
  const navigate = (id) => { setActiveAgent(null); setView(id); };

  const VIEW_TITLES = { dashboard:"Dashboard", pipeline:"Bid Pipeline", sources:"Sources Sought", thread:"Mission Thread", audit:"Readiness Audit", profile:"Profile" };

  const renderView = () => {
    if (activeAgent) return <AgentChat agent={activeAgent} onBack={closeAgent} thread={thread} setThread={setThread} apiKey={apiKey}/>;
    switch(view) {
      case "pipeline": return <Pipeline/>;
      case "sources":  return <SourcesSought apiKey={apiKey}/>;
      case "thread":   return <Thread thread={thread} setThread={setThread}/>;
      case "audit":    return <Audit/>;
      case "profile":  return <Profile onResetKey={() => { try { localStorage.removeItem("sg_apikey"); } catch {} setApiKey(""); }}/>;
      default:         return <Dashboard onOpenAgent={openAgent} thread={thread}/>;
    }
  };

  return (
    <>
      <GlobalStyle/>
      <div style={{ display:"flex", height:"100vh", height:"100dvh", overflow:"hidden" }}>

        {/* Desktop Sidebar */}
        <div style={{ display: isMobile ? "none" : "flex" }}>
          <Sidebar view={view} activeAgent={activeAgent} onNav={navigate} onOpenAgent={openAgent}/>
        </div>

        {/* Main */}
        <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden", minWidth:0 }}>

          {/* Topbar */}
          {!activeAgent && (
            <div style={g({ height:52, background:"rgba(255,255,255,0.88)", backdropFilter:"blur(20px)", WebkitBackdropFilter:"blur(20px)", borderBottom:`1px solid ${C.line}`, display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 20px", flexShrink:0, zIndex:50 })}>
              <div style={g({ fontSize:17, fontWeight:600, letterSpacing:"-0.022em" })}>{VIEW_TITLES[view]}</div>
              <div style={{ display:"flex", gap:6 }}>
                <span style={g({ fontSize:11.5, fontWeight:500, fontFamily:"'SF Mono',monospace", padding:"4px 10px", borderRadius:20, background:C.greenBg, color:"#1a7f37" })}>● SAM.gov Active</span>
                <span style={g({ fontSize:11.5, fontWeight:500, fontFamily:"'SF Mono',monospace", padding:"4px 10px", borderRadius:20, background:C.bg, border:`1px solid ${C.line}`, color:C.text2 })}>CAGE 8WJN9</span>
              </div>
            </div>
          )}

          {/* Content */}
          <div style={{ flex:1, overflowY:"auto", WebkitOverflowScrolling:"touch" }}>
            {renderView()}
          </div>
        </div>

        {/* Mobile Bottom Nav */}
        {!activeAgent && (
          <div style={{ display: isMobile ? "block" : "none" }}>
            <BottomNav view={view} onNav={navigate}/>
          </div>
        )}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
